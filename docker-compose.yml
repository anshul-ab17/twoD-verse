services:
  postgres:
    # pgvector/pgvector = official postgres 16 + vector extension (semantic search)
    image: pgvector/pgvector:pg16
    container_name: verse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: verse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LiveKit SFU in dev mode (key: devkey / secret: secret) — matches apps/rtc .example.env
  livekit:
    image: livekit/livekit-server:latest
    container_name: verse-livekit
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880" # ws / http
      - "7881:7881" # rtc tcp
      - "7882:7882/udp" # rtc udp

volumes:
  postgres_data:
  redis_data:
