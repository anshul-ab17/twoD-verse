# nginx reverse proxy for the Hetzner box (alternative to Caddy — run only one).
# Install:
#   apt install -y nginx certbot python3-certbot-nginx
#   cp twodverse.conf /etc/nginx/sites-available/twodverse
#   sed -i 's/your-domain.com/<apna-domain>/g' /etc/nginx/sites-available/twodverse
#   ln -s /etc/nginx/sites-available/twodverse /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx   # TLS certs for all server_names
# Cloudflare proxied ("Full" mode) sits in front; livekit stays DNS-only.

# WebSocket upgrade helper (Colyseus + LiveKit signalling)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# realtime (Colyseus) — WebSocket
server {
    listen 80;
    server_name rt.your-domain.com;

    location / {
        proxy_pass http://localhost:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s; # long-lived game sockets
    }
}

# gateway (auth/social REST)
server {
    listen 80;
    server_name api.your-domain.com;

    location / {
        proxy_pass http://localhost:2569;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # per-IP rate limits need the real client IP
    }
}

# media (LiveKit token service)
server {
    listen 80;
    server_name media.your-domain.com;

    location / {
        proxy_pass http://localhost:2568;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ai (meeting notes)
server {
    listen 80;
    server_name ai.your-domain.com;

    location / {
        proxy_pass http://localhost:2570;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# livekit signalling — WebSocket (WebRTC media itself goes direct via UDP 50000-50100)
server {
    listen 80;
    server_name livekit.your-domain.com;

    location / {
        proxy_pass http://localhost:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
