# Production stack for a single Hetzner box (first deploy; K8s is the scale-out
# path per plan §14). Web runs on Vercel, TLS/edge on Cloudflare — this box only
# serves the APIs + realtime + data stores.
#
# Usage on the server:
#   cp .env.prod.example .env.prod   # fill secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
name: twodverse

x-service: &service
  restart: unless-stopped
  env_file: .env.prod
  depends_on:
    - postgres
    - redis

services:
  postgres:
    # pgvector/pgvector = official postgres 16 + vector extension (semantic search)
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-verse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  game-engine:
    <<: *service
    image: ${IMAGE_PREFIX}/twodverse-game-engine:${TAG:-latest}
    ports: ["2567:2567"]

  server:
    <<: *service
    image: ${IMAGE_PREFIX}/twodverse-server:${TAG:-latest}
    ports: ["2569:2569"]

  rtc:
    <<: *service
    image: ${IMAGE_PREFIX}/twodverse-rtc:${TAG:-latest}
    ports: ["2568:2568"]

  assist:
    <<: *service
    image: ${IMAGE_PREFIX}/twodverse-assist:${TAG:-latest}
    ports: ["2570:2570"]

volumes:
  postgres_data:
  redis_data:
