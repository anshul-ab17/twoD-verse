name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [game-engine, server, rtc, assist]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.bun
          build-args: APP=${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/twodverse-${{ matrix.app }}:latest
            ghcr.io/${{ github.repository_owner }}/twodverse-${{ matrix.app }}:${{ github.sha }}

  deploy-hetzner:
    needs: build-images
    runs-on: ubuntu-latest
    # runs only once the server secrets are configured in repo settings
    if: ${{ vars.HETZNER_ENABLED == 'true' }}
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/twodverse
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T server \
              sh -c "cd packages/db && bunx prisma migrate deploy"
  # web deploys via Vercel's git integration on the same push — nothing to do here
